services:
  # ── Frontend (Vite React) ────────────────────────────────────
  - type: web
    name: crm-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  # ── Backend (Node/Express) ───────────────────────────────────
  - type: web
    name: flowcrm-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install --include=dev && npx prisma generate && (npx prisma migrate resolve --rolled-back 20260607002545_phase1_5_all_sectors 2>/dev/null || true) && (npx prisma migrate resolve --rolled-back 20260607120000_branding_compliance 2>/dev/null || true) && npx prisma migrate deploy && npm run build
    startCommand: node backend/dist/cluster.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: 1
      - key: DB_POOL_LIMIT
        value: 5
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
