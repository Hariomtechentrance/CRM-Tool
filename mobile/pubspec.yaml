name: flowcrm_mobile
description: FlowCRM – Complete Business Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  fl_chart: ^0.67.0
  timeago: ^3.6.1
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  image_picker: ^1.1.2
  file_picker: ^8.0.0+1
  open_filex: ^4.5.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
