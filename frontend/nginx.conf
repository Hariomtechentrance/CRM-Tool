server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;
    # Stop MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer leakage control
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restrict dangerous browser features; deny clipboard-read so a rogue
    # script cannot silently harvest clipboard contents (clipboard attack)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), clipboard-read=(), fullscreen=(self)" always;
    # Content Security Policy — tight allowlist prevents XSS execution and
    # data exfiltration even if a script injection slips through
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; worker-src 'self' blob:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
    # Remove server fingerprint
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache static assets aggressively (Vite fingerprints them)
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
